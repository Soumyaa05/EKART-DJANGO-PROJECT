<!DOCTYPE html>
<html>
<head>
    <title>E Store</title>

    <style>
        body {
            font-family: Arial;
            background-color: rgb(210, 244, 203);
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            padding: 20px;
            justify-content: center;
        }

        .card {
            background: white;
            width: 250px;
            border-radius: 10px;
            overflow: hidden;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .card-body {
            padding: 15px;
        }

        .price {
            color: rgb(11, 183, 11);
            font-weight: bold;
        }

        .btn {
            display: block;
            text-align: center;
            background: red;
            color: wheat;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
        }

    </style>
</head>

<body>
<div style="background:rgb(12, 12, 88); padding:10px; color:white; display:flex; justify-content:space-between;">
    
    <div>
        E Store
    </div>

    <div>
        <a href="/" style="color:white; margin-right:10px;">Home</a>
        <a href="/cart/" style="color:white; margin-right:10px;">Cart</a>
        <a href="/login/" style="color: white;">Logout</a>
    </div>

</div>
<h1 style="text-align:center;"> E Store</h1>

<div class="container">

{% for product in products %}
    <div class="card">
        <img src="{{ product.image.url }}">
        
        <div class="card-body">
            <h3>
                    <a href="/product/{{ product.id }}/">
                                {{ product.name }}
                    </a>
            </h3>
            <p class="price">₹{{ product.price }}</p>
            <p>{{ product.description|truncatewords:10 }}</p>

            <a href="{% url 'add_to_cart' product.id %}"class="btn">Add to Cart</a>
            <a href="/cart/">Go to Cart</a>
        </div>
    </div>
{% endfor %}

</div>

</body>
</html>
