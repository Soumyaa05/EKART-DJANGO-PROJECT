<!DOCTYPE html>
<html>
<head>
    <title>{{ product.name }}</title>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background-color: rgb(210, 244, 203);
        }

        .container {
            display: flex;
            gap: 30px;
        }

        img {
            width: 300px;
            border-radius: 10px;
        }

        .price {
            color: green;
            font-size: 22px;
            font-weight: bold;
        }

        .btn {
            display: inline-block;
            background: orange;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            margin-top: 10px;
        }
    </style>
</head>

<body>
<div style="background:rgb(12, 12, 88); padding:10px; color:white; display:flex; justify-content:space-between;">
    
    <div>
        E Store
    </div>

    <div>
        <a href="/" style="color:white; margin-right:10px;">Home</a>
        <a href="/cart/" style="color:white; margin-right:10px;">Cart</a>
        <a href="/login/" style="color:white;">Logout</a>
    </div>

</div>
<h1>{{ product.name }}</h1>

<div class="container">
    <img src="{{ product.image.url }}">

    <div>
        <p class="price">₹{{ product.price }}</p>
        <p>{{ product.description }}</p>

        <a href="/add-to-cart/{{ product.id }}/" class="btn">Add to Cart</a>
    </div>
</div>

</body>
</html>
